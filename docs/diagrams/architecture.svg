<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, system-ui, sans-serif">

  <!-- Background -->
  <rect width="1000" height="720" fill="#fafaf7"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#1a1a1a">Pathways — System Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#666">Reentry navigation for Texas, built on Claude Code primitives + an explicit LangGraph state machine</text>

  <!-- ===== Layer 1: Ingress ===== -->
  <g>
    <rect x="80" y="90" width="840" height="60" rx="6" fill="#e9f0fb" stroke="#5478a8" stroke-width="1.5"/>
    <text x="100" y="113" font-size="13" font-weight="600" fill="#2c3e50">Ingress</text>
    <text x="100" y="132" font-size="11" fill="#555">Inbound channels — Twilio SMS webhook, claude.ai chat, REST API</text>

    <g transform="translate(550, 100)">
      <rect width="120" height="40" rx="4" fill="#fff" stroke="#5478a8"/>
      <text x="60" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Twilio SMS</text>
      <text x="60" y="32" text-anchor="middle" font-size="10" fill="#666">POST /sms (TwiML)</text>
    </g>
    <g transform="translate(680, 100)">
      <rect width="100" height="40" rx="4" fill="#fff" stroke="#5478a8"/>
      <text x="50" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">claude.ai</text>
      <text x="50" y="32" text-anchor="middle" font-size="10" fill="#666">Skills + agents</text>
    </g>
    <g transform="translate(790, 100)">
      <rect width="120" height="40" rx="4" fill="#fff" stroke="#5478a8"/>
      <text x="60" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">/_debug/invoke</text>
      <text x="60" y="32" text-anchor="middle" font-size="10" fill="#666">tracing endpoint</text>
    </g>
  </g>

  <!-- ===== Layer 2: Safety hooks (deterministic) ===== -->
  <g>
    <rect x="80" y="170" width="840" height="80" rx="6" fill="#fdeeec" stroke="#c44b3d" stroke-width="1.5"/>
    <text x="100" y="193" font-size="13" font-weight="600" fill="#7a2218">Safety hooks (deterministic, outside model loop)</text>
    <text x="100" y="210" font-size="11" fill="#7a2218">.claude/hooks/ — Python subprocesses on UserPromptSubmit / PreToolUse / PostToolUse</text>

    <g transform="translate(100, 218)">
      <rect width="240" height="26" rx="4" fill="#fff" stroke="#c44b3d"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#7a2218">crisis_keyword_check</text>
      <text x="135" y="17" font-size="10" fill="#666">UserPromptSubmit • 7 categories</text>
    </g>
    <g transform="translate(360, 218)">
      <rect width="240" height="26" rx="4" fill="#fff" stroke="#c44b3d"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#7a2218">pii_redact</text>
      <text x="80" y="17" font-size="10" fill="#666">PreToolUse • SSN/phone/DOB/TDCJ</text>
    </g>
    <g transform="translate(620, 218)">
      <rect width="280" height="26" rx="4" fill="#fff" stroke="#c44b3d"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#7a2218">rag_confidence_gate</text>
      <text x="135" y="17" font-size="10" fill="#666">PostToolUse • floor 0.62 default</text>
    </g>
  </g>

  <!-- ===== Layer 3: LangGraph state machine ===== -->
  <g>
    <rect x="80" y="270" width="600" height="290" rx="6" fill="#eaf5ed" stroke="#3a7a4b" stroke-width="1.5"/>
    <text x="100" y="293" font-size="13" font-weight="600" fill="#1a4d2b">LangGraph state machine (pathways/graph.py)</text>
    <text x="100" y="310" font-size="11" fill="#1a4d2b">7 nodes • explicit conditional edges • bounded revision loop</text>

    <!-- intake -->
    <g transform="translate(110, 330)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">intake</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">extract + route</text>
    </g>

    <!-- retrieve -->
    <g transform="translate(250, 330)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">retrieve</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">corpus → BM25</text>
    </g>

    <!-- match -->
    <g transform="translate(390, 330)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">match</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">tx-resources</text>
    </g>

    <!-- draft -->
    <g transform="translate(530, 330)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">draft</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">Sonnet synthesis</text>
    </g>

    <!-- audit -->
    <g transform="translate(530, 416)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">audit</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">compliance-auditor</text>
    </g>

    <!-- send -->
    <g transform="translate(390, 502)">
      <rect width="110" height="46" rx="4" fill="#fff" stroke="#3a7a4b" stroke-width="1.5"/>
      <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a4d2b">send</text>
      <text x="55" y="36" text-anchor="middle" font-size="10" fill="#555">→ final_response</text>
    </g>

    <!-- escalate -->
    <g transform="translate(110, 502)">
      <rect width="160" height="46" rx="4" fill="#fff5e6" stroke="#c47b3a" stroke-width="1.5"/>
      <text x="80" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#7a4a18">escalate</text>
      <text x="80" y="36" text-anchor="middle" font-size="10" fill="#7a4a18">988 / 211 / DV / legal aid</text>
    </g>

    <!-- Edges between nodes -->
    <!-- intake → retrieve (normal) -->
    <path d="M 220 353 L 248 353" stroke="#3a7a4b" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <!-- retrieve → match -->
    <path d="M 360 353 L 388 353" stroke="#3a7a4b" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <!-- match → draft -->
    <path d="M 500 353 L 528 353" stroke="#3a7a4b" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <!-- draft → audit -->
    <path d="M 585 376 L 585 414" stroke="#3a7a4b" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <!-- audit → send (pass) -->
    <path d="M 530 462 Q 480 462 460 500" stroke="#3a7a4b" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="475" y="492" font-size="10" fill="#1a4d2b">pass</text>
    <!-- audit → draft (soft_block, revision loop) -->
    <path d="M 530 425 Q 460 380 550 380" stroke="#5e8f6f" stroke-width="1.2" fill="none" stroke-dasharray="3,3" marker-end="url(#arrowGreenLight)"/>
    <text x="438" y="397" font-size="9" fill="#5e8f6f">soft_block (≤2)</text>
    <!-- audit → escalate (hard_block) -->
    <path d="M 530 450 Q 350 480 250 500" stroke="#c47b3a" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
    <text x="320" y="478" font-size="10" fill="#7a4a18">hard_block / exhausted</text>
    <!-- intake → escalate (crisis) -->
    <path d="M 165 376 Q 130 440 175 500" stroke="#c47b3a" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
    <text x="80" y="430" font-size="10" fill="#7a4a18">crisis short-circuit</text>

    <!-- Notes block -->
    <g transform="translate(110, 565)">
      <rect width="540" height="38" rx="3" fill="#fff" stroke="#3a7a4b" stroke-dasharray="2,2" opacity="0.7"/>
      <text x="10" y="15" font-size="10" fill="#1a4d2b" font-weight="600">Why explicit graph (not thin coordinator):</text>
      <text x="10" y="29" font-size="10" fill="#1a4d2b">Audit is non-skippable. Every transition has an address. Each node has minimum required capability.</text>
    </g>
  </g>

  <!-- ===== Layer 4: MCP servers ===== -->
  <g>
    <rect x="700" y="270" width="220" height="290" rx="6" fill="#f0e8f5" stroke="#7a4d9e" stroke-width="1.5"/>
    <text x="720" y="293" font-size="13" font-weight="600" fill="#4a2870">MCP servers</text>
    <text x="720" y="310" font-size="11" fill="#4a2870">Knowledge contracts at the tool layer</text>

    <g transform="translate(720, 330)">
      <rect width="180" height="46" rx="4" fill="#fff" stroke="#7a4d9e"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#4a2870">pathways-corpus</text>
      <text x="10" y="32" font-size="10" fill="#555">stdio • 65 real TX statutes</text>
    </g>

    <g transform="translate(720, 386)">
      <rect width="180" height="46" rx="4" fill="#fff" stroke="#7a4d9e"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#4a2870">tx-resources</text>
      <text x="10" y="32" font-size="10" fill="#555">stdio • 18 partner orgs</text>
    </g>

    <g transform="translate(720, 442)">
      <rect width="180" height="46" rx="4" fill="#fff" stroke="#7a4d9e" stroke-dasharray="3,3"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#4a2870">twilio-sms</text>
      <text x="10" y="32" font-size="10" fill="#555">http • HITL-gated send</text>
    </g>

    <g transform="translate(720, 498)">
      <rect width="180" height="46" rx="4" fill="#fff" stroke="#7a4d9e" stroke-dasharray="3,3"/>
      <text x="10" y="17" font-size="11" font-weight="600" fill="#4a2870">pathways-postgres</text>
      <text x="10" y="32" font-size="10" fill="#555">read-only views • case mgr</text>
    </g>
  </g>

  <!-- ===== Layer 5: Skills + sub-agents ===== -->
  <g>
    <rect x="80" y="620" width="840" height="78" rx="6" fill="#fef9e1" stroke="#a08220" stroke-width="1.5"/>
    <text x="100" y="643" font-size="13" font-weight="600" fill="#5c4a10">Skills (.claude/skills/) and sub-agents (.claude/agents/) — bounded-capability protocols</text>

    <g transform="translate(100, 656)">
      <text x="0" y="14" font-size="11" font-weight="600" fill="#5c4a10">Skills (7):</text>
      <text x="0" y="30" font-size="10" fill="#5c4a10">intake-assessment · niccc-lookup · housing-pathway · employment-pathway · record-clearing-tx · benefits-navigator · crisis-response</text>
    </g>
    <g transform="translate(100, 678)">
      <text x="0" y="14" font-size="11" font-weight="600" fill="#5c4a10">Sub-agents (4):</text>
      <text x="74" y="14" font-size="10" fill="#5c4a10">compliance-auditor (json) · eligibility-checker (read-only) · resource-matcher · caseload-summarizer (isolated)</text>
    </g>
  </g>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#3a7a4b"/>
    </marker>
    <marker id="arrowGreenLight" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#5e8f6f"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#c47b3a"/>
    </marker>
  </defs>

</svg>
