name: Weekly Data Refresh

on:
  schedule:
    # Mondays 09:00 UTC = 04:00 CT (5am DST). Off-peak for HRSA + Supabase.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    name: Run ingesters + mark stale rows
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_REFRESH == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PATHWAYS_LOG_LEVEL: INFO
        run: |
          python -m scripts.refresh_data
